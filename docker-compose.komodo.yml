services:
  bosso-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: estoque-dashboard:v2
    container_name: bosso-dashboard
    restart: always
    networks:
      - komodo_default
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - DATA_DIR=/app/data
    volumes:
      - /root/projects/estoque-dashboard/data:/app/data:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=komodo_default"
      - "traefik.http.routers.bosso-dashboard.rule=Host(`dashboard.bosso.izzispark.cloud`)"
      - "traefik.http.routers.bosso-dashboard.entrypoints=websecure"
      - "traefik.http.routers.bosso-dashboard.tls=true"
      - "traefik.http.routers.bosso-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.services.bosso-dashboard.loadbalancer.server.port=3000"

networks:
  komodo_default:
    external: true
